<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Dry Run</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="header">
        <div>
          <p class="eyebrow">Accentedness project</p>
          <h1>Opening dry run</h1>
        </div>
      </header>

      <section class="panel">
        <div class="panel-heading">
          <div>
            <h2>Dry-run session</h2>
            <p>A unique dry-run participant link is being generated.</p>
          </div>
          <div class="setup-status" data-ready="true">Redirecting</div>
        </div>
        <p>
          If the task does not open automatically, use the button below.
        </p>
        <div class="admin-actions">
          <a id="dry-run-link" class="button-link" href="/">Open dry run</a>
        </div>
      </section>
    </main>
    <script src="dry-run.js"></script>
  </body>
</html>
