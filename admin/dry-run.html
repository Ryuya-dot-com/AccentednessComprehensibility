<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Dry Run</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="header">
        <div>
          <p class="eyebrow">Accentedness project</p>
          <h1>Opening dry run</h1>
        </div>
      </header>

      <section class="panel">
        <div class="panel-heading">
          <div>
            <h2>Dry-run session</h2>
            <p>A unique dry-run participant link is being generated.</p>
          </div>
          <div class="setup-status" data-ready="true">Redirecting</div>
        </div>
        <p>
          If the task does not open automatically, use the button below.
        </p>
        <div class="admin-actions">
          <a id="dry-run-link" class="button-link" href="/">Open dry run</a>
        </div>
      </section>
    </main>
    <script>
      (function () {
        "use strict";

        function randomSuffix() {
          const bytes = new Uint8Array(6);
          window.crypto.getRandomValues(bytes);
          return Array.from(bytes, function (byte) {
            return byte.toString(16).padStart(2, "0");
          }).join("");
        }

        const timestamp = new Date().toISOString().replace(/[-:.TZ]/g, "").slice(0, 14);
        const dryRunId = "DRYRUN_" + timestamp + "_" + randomSuffix();
        const params = new URLSearchParams({
          dry_run: "1",
          PROLIFIC_PID: dryRunId,
          STUDY_ID: "DRY_RUN",
          SESSION_ID: dryRunId + "_SESSION",
          completion_code: "DRY-RUN",
        });
        const target = "/?" + params.toString();
        const link = document.getElementById("dry-run-link");
        link.href = target;
        window.setTimeout(function () {
          window.location.replace(target);
        }, 250);
      })();
    </script>
  </body>
</html>
